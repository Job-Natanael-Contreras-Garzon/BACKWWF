# docker-compose.yml — Desarrollo local y pruebas
# USO: docker compose up --build
#
# Para producción usa la DigitalOcean App Spec (digitalocean.yaml)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fauna-monitoring-api:local
    container_name: fauna_api
    ports:
      - "8000:8000"
    environment:
      # La base de datos está en Aiven (remota), solo se necesita la URL
      DATABASE_URL: ${DATABASE_URL}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://localhost:8081}
    env_file:
      - .env
    volumes:
      # Montar uploads fuera del contenedor para persistir videos en local
      - ./uploads:/code/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Override del CMD para desarrollo: hot-reload
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
